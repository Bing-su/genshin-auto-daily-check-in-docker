# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  update:
    cmds:
      - uv sync --all-extras --all-groups --upgrade
      - prek auto-update
      - task: export
    desc: Update all dependencies

  export:
    cmds:
      - uv export --format pylock.toml -o pylock.toml --no-group dev
      - tombi format pylock.toml
    desc: Export lock file to pylock.toml

  docker:
    cmds:
      - docker buildx bake {{ .CLI_ARGS }}
    desc: Build docker image
